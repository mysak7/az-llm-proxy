router_settings:
  # usage-based-routing-v2 tracks RPM/TPM per key and routes to the least loaded one.
  routing_strategy: usage-based-routing-v2
  num_retries: 3
  retry_after: 5

litellm_settings:
  set_verbose: false
  drop_params: true        # silently ignore unknown params (e.g. reasoning_effort)

# ── Model list ─────────────────────────────────────────────────────────────────
# Each model is duplicated 5 times — one entry per GitHub token.
# LiteLLM load-balances across all entries sharing the same model_name,
# giving 5x the rate limit of a single token.
#
# Fill in GITHUB_TOKEN_2 … GITHUB_TOKEN_5 in .env to activate the extra slots.
# ──────────────────────────────────────────────────────────────────────────────

