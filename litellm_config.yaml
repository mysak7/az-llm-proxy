router_settings:
  # Strategy for load balancing across multiple backends of the same model.
  # Switch to "usage-based-routing-v2" when adding more regions / API keys.
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_after: 5

litellm_settings:
  set_verbose: false
  drop_params: true        # silently ignore unknown params (e.g. reasoning_effort)

# ── Model list ─────────────────────────────────────────────────────────────────
# Each entry maps a friendly model_name (what clients send) to a backend.
# To add throughput later: duplicate any block with a different api_key /
# azure_ai region and give it the same model_name — LiteLLM load-balances
# automatically across all entries sharing the same name.
#
# Example — adding a second GitHub token for higher RPM:
#   - model_name: gpt-4o
#     litellm_params:
#       model: openai/gpt-4o
#       api_base: https://models.inference.ai.azure.com
#       api_key: os.environ/GITHUB_TOKEN_2
#
# Example — adding a real Azure OpenAI regional deployment:
#   - model_name: gpt-4o
#     litellm_params:
#       model: azure/gpt-4o
#       api_base: https://my-resource.openai.azure.com
#       api_version: "2024-02-01"
#       api_key: os.environ/AZURE_OPENAI_KEY_EASTUS
# ──────────────────────────────────────────────────────────────────────────────

model_list:

  # ── OpenAI ──────────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://models.inference.ai.azure.com
      api_key: os.environ/GITHUB_TOKEN

  - model_name: gpt-4o-mini
